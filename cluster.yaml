apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: lab-observability
  region: us-east-1
  version: "1.31" # Use uma versão recente e estável do EKS

# Definindo o grupo de nós
managedNodeGroups:
  - name: observability-nodes
    instanceType: t3.medium
    minSize: 2
    maxSize: 3
    desiredCapacity: 2
    # Garante instâncias On-Demand (não Spot), evitando interrupções inesperadas
    spot: false
    # Aumentando o volume para comportar as métricas do Prometheus e traces do Jaeger
    volumeSize: 30 
    volumeType: gp3
    # Configuração de rede para garantir que os nós consigam se comunicar bem
    ssh:
      allow: true
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true